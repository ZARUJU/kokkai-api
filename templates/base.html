<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | kokkai-api UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ url_for('index') }}">kokkai-api UI</a>
        <nav class="main-nav">
          <a class="tab-link {% if active_section == 'kaiki' %}is-active{% endif %}" href="{{ url_for('kaiki_index') }}">会期</a>
          <a class="tab-link {% if active_section == 'kaigiroku' %}is-active{% endif %}" href="{{ url_for('kaigiroku_index') }}">会議録</a>
          <a class="tab-link {% if active_section == 'people' %}is-active{% endif %}" href="{{ url_for('people_index') }}">人物</a>
          <a class="tab-link {% if active_section == 'gian' %}is-active{% endif %}" href="{{ url_for('gian_index') }}">議案</a>
          <a class="tab-link {% if active_section == 'seigan' %}is-active{% endif %}" href="{{ url_for('seigan_index', house='shugiin') }}">請願</a>
          <a class="tab-link {% if active_section == 'shitsumon' %}is-active{% endif %}" href="{{ url_for('shitsumon_index', house='shugiin') }}">質問主意書</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer wrap">
      <span>API: <code>{{ api_base_url }}</code></span>
    </footer>
    <script>
      (() => {
        function updateTabQueryParam(targetId) {
          const url = new URL(window.location.href);
          url.searchParams.set("tab", targetId);
          window.history.replaceState({}, "", url);
        }

        function syncTabFieldForGetForms(targetId) {
          const forms = document.querySelectorAll('form[method="get"]');
          for (const form of forms) {
            let input = form.querySelector('input[name="tab"]');
            if (!input) {
              input = document.createElement("input");
              input.type = "hidden";
              input.name = "tab";
              form.appendChild(input);
            }
            input.value = targetId;
          }
        }

        const tabRoots = document.querySelectorAll("[data-tab-root]");
        const requestedTab = new URL(window.location.href).searchParams.get("tab");
        for (const root of tabRoots) {
          const buttons = Array.from(root.querySelectorAll("[data-tab-target]"));
          const panels = Array.from(root.querySelectorAll(".tab-panel"));
          if (!buttons.length || !panels.length) {
            continue;
          }

          function activateTab(targetId, options = {}) {
            const shouldSyncUrl = options.syncUrl ?? true;
            for (const button of buttons) {
              const active = button.dataset.tabTarget === targetId;
              button.classList.toggle("is-active", active);
              button.setAttribute("aria-selected", active ? "true" : "false");
            }

            for (const panel of panels) {
              const active = panel.id === targetId;
              panel.classList.toggle("is-active", active);
              panel.hidden = !active;
            }

            if (shouldSyncUrl) {
              updateTabQueryParam(targetId);
              syncTabFieldForGetForms(targetId);
            }
          }

          for (const button of buttons) {
            button.addEventListener("click", () => activateTab(button.dataset.tabTarget));
          }

          const defaultButton = buttons.find((button) => button.classList.contains("is-active"));
          const initialTarget = buttons.some(
            (button) => button.dataset.tabTarget === requestedTab
          )
            ? requestedTab
            : defaultButton?.dataset.tabTarget;
          if (initialTarget) {
            activateTab(initialTarget, { syncUrl: false });
            syncTabFieldForGetForms(initialTarget);
          }
        }
      })();
    </script>
  </body>
</html>
